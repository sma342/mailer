<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mailer Sign-Up</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f9fc; color: #333; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 0 12px rgba(0,0,0,0.08); }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 8px; font-weight: bold; }
    .field input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
    .button { display: inline-block; padding: 12px 20px; background: #2c7be5; color: white; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; }
    .flash { padding: 12px 16px; margin-bottom: 16px; border-radius: 6px; }
    .flash-success { background: #d4edda; color: #155724; }
    .flash-danger { background: #f8d7da; color: #721c24; }
    .flash-info { background: #d1ecf1; color: #0c5460; }
    .footer { margin-top: 24px; color: #6c757d; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Mailer</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/" method="post">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button class="button" type="submit">Subscribe</button>
    </form>

    <div class="footer">
      <p><a href="/subscribers">View subscribers</a></p>
    </div>
  </div>
</body>
</html>
